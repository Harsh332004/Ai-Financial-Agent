version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: financial_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
      - ./indexes:/app/indexes
      - ./reports:/app/reports
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - backend
    env_file: .env
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  postgres_data:

